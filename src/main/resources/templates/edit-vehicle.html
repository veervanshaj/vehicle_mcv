<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="ISO-8859-1">
    <title>Vehicle Rental System</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}"> </head>

<body>
<div class="container">
    <h1>Vehicle Rental System</h1>
    <hr>
    <h2>Update Vehicle</h2>

    <form action="#" th:action="@{/saveVehicle}" th:object="${vehicle}" method="POST">

        <input type="hidden" th:field="*{id}" />

        <input type="text" th:field="*{name}" class="form-control mb-4 col-4">

        <input type="text" th:field="*{type}" class="form-control mb-4 col-4">

        <input type="text" th:field="*{rentPerDay}" class="form-control mb-4 col-4">

        <button type="submit" class="btn btn-info col-2"> Update Vehicle</button>
    </form>

    <hr>

    <a th:href="@{/}"> Back to Vehicle List</a>
</div>
</body>

</html>
