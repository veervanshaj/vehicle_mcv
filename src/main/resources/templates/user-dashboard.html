<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Welcome, <span th:text="${user.name}"></span>! (ID: <span th:text="${user.id}"></span>)</h1>
    <hr>

    <h2>Your Rented Vehicles</h2>
    <table class="table table-striped" th:if="${!rentedVehicles.isEmpty()}">
        <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Rent Per Day</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vehicle : ${rentedVehicles}">
            <td th:text="${vehicle.name}"></td>
            <td th:text="${vehicle.type}"></td>
            <td th:text="${vehicle.rentPerDay}"></td>
            <td>
                <a th:href="@{/return-vehicle/{userId}/{vehicleId}(userId=${user.id}, vehicleId=${vehicle.id})}"
                   class="btn btn-warning">Return</a>
            </td>
        </tr>
        </tbody>
    </table>
    <div th:if="${rentedVehicles.isEmpty()}">
        <p>You have not rented any vehicles.</p>
    </div>

    <hr>

    <h2>Available Vehicles for Rent</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Rent Per Day</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vehicle : ${availableVehicles}">
            <td th:text="${vehicle.name}"></td>
            <td th:text="${vehicle.type}"></td>
            <td th:text="${vehicle.rentPerDay}"></td>
            <td>
                <a th:href="@{/rent-vehicle/{userId}/{vehicleId}(userId=${user.id}, vehicleId=${vehicle.id})}"
                   class="btn btn-success">Rent</a>
            </td>
        </tr>
        </tbody>
    </table>
    <hr>
    <a th:href="@{/login}">Logout</a>
</div>
</body>
</html>
