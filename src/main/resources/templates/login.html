<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Login</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>User Login</h1>
    <hr>
    <div th:if="${param.error}" class="alert alert-danger">
        Invalid username and password.
    </div>
    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Enter your name" class="form-control mb-4 col-4">
        <input type="password" name="password" placeholder="Enter your password" class="form-control mb-4 col-4">
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <hr>
    <a th:href="@{/register}">Create a new ID</a>
</div>
</body>
</html>
