<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
    <title>Vehicle Rental System</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container my-2">
    <h1>Vehicle Rental System</h1>
    <hr>

    <a th:href="@{/login}" class="btn btn-primary btn-sm mb-3">User Portal</a>
    <a th:href="@{/showNewVehicleForm}" class="btn btn-secondary btn-sm mb-3">Vehicle Management</a>

    <h2>All Vehicles</h2>
    <table border="1" class = "table table-striped table-responsive-md">
        <thead>
        <tr>
            <th>Vehicle Name</th>
            <th>Vehicle Type</th>
            <th>Rent Per Day</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vehicle : ${listVehicles}">
            <td th:text="${vehicle.name}"></td>
            <td th:text="${vehicle.type}"></td>
            <td th:text="${vehicle.rentPerDay}"></td>
            <td th:text="${vehicle.isRented ? 'Rented' : 'Available'}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
