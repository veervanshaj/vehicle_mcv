<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register User</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Register New User</h1>
    <hr>
    <form th:action="@{/register}" th:object="${user}" method="post">
        <input type="text" th:field="*{name}" placeholder="Enter your name" class="form-control mb-4 col-4">
        <input type="password" th:field="*{password}" placeholder="Enter a password" class="form-control mb-4 col-4">
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
</div>
</body>
</html>
